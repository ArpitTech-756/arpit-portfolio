<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Coming Soon · Oma Londo</title>
  <!-- Google Fonts: Playfair Display for elegance, Inter for modern sans -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    html, body {
  height: 100%;
}
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

 body {
  min-height: 100vh;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 10% 20%, #2b1a0f, #1a0f0a, #0c0b0e);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  position: relative;
  overflow-x: hidden;
}
    /* Animated gradient overlay */
    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(125deg, #d4a373, #9e6b4e, #6b3e2b, #3b2a1c);
      background-size: 300% 300%;
      opacity: 0.5;
      animation: gradientMove 18s ease infinite;
      z-index: 0;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating particles (food/dots) */
    .particle {
      position: absolute;
      background: rgba(255, 215, 140, 0.2);
      border-radius: 50%;
      filter: blur(30px);
      z-index: 0;
      animation: floatParticle 20s infinite alternate;
    }

    .particle1 {
      width: 300px;
      height: 300px;
      top: -100px;
      left: -100px;
      background: rgba(244, 162, 97, 0.25);
    }

    .particle2 {
      width: 400px;
      height: 400px;
      bottom: -150px;
      right: -150px;
      background: rgba(231, 111, 81, 0.25);
      animation-duration: 25s;
    }

    .particle3 {
      width: 200px;
      height: 200px;
      top: 40%;
      left: 70%;
      background: rgba(255, 229, 180, 0.3);
      animation-duration: 15s;
    }

    @keyframes floatParticle {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(60px, -60px) scale(1.2); }
    }

    /* Main glass card */
    .card {
      position: relative;
      z-index: 20;
      max-width: 780px;
      width: 100%;
      background: rgba(20, 15, 12, 0.4);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border-radius: 4rem;
      padding: 3.5rem 2.5rem;
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(255, 210, 140, 0.2);
      border: 1px solid rgba(255, 180, 100, 0.3);
      color: white;
      text-align: center;
      animation: appear 1.2s cubic-bezier(0.23, 1, 0.32, 1) forwards;
      transform-origin: center;
    }

    @keyframes appear {
      0% { opacity: 0; transform: scale(0.92) translateY(30px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Est. badge */
    .est {
      display: inline-block;
      background: rgba(255, 255, 255, 0.08);
      padding: 0.5rem 1.8rem;
      border-radius: 60px;
      font-size: 0.85rem;
      letter-spacing: 3px;
      font-weight: 300;
      margin-bottom: 2rem;
      border: 1px solid rgba(255, 210, 140, 0.3);
      backdrop-filter: blur(4px);
      animation: slideUp 0.7s 0.1s both;
    }

    /* Main Coming Soon headline */
    .coming-soon-main {
      font-family: 'Playfair Display', serif;
      font-size: clamp(3.5rem, 15vw, 7rem);
      font-weight: 700;
      line-height: 1.1;
      margin-bottom: 1rem;
      background: linear-gradient(145deg, #fff3e0, #ffd9a5);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow: 0 10px 30px rgba(0,0,0,0.5);
      animation: slideUp 0.7s 0.2s both;
      text-transform: uppercase;
      letter-spacing: 4px;
    }

    /* Optional subtext */
    .subtext {
      font-size: 1.2rem;
      font-weight: 300;
      letter-spacing: 4px;
      margin-bottom: 2rem;
      opacity: 0.8;
      animation: slideUp 0.7s 0.3s both;
    }

    /* Question marks – animated */
    .question-box {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin: 2rem 0 1.5rem;
      font-size: 2.5rem;
      font-weight: 300;
      color: #ffdbb5;
      opacity: 0.6;
    }

    .question-box span {
      animation: pulse 2.5s infinite;
      display: inline-block;
    }

    .question-box span:nth-child(2) {
      animation-delay: 0.8s;
    }
    .question-box span:nth-child(3) {
      animation-delay: 1.6s;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 1; }
    }

    /* Platforms */
    .platforms {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 2rem;
      margin: 2.5rem 0 1rem;
      animation: slideUp 0.7s 0.4s both;
    }

    .platform {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      background: rgba(0, 0, 0, 0.4);
      padding: 0.9rem 2rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 190, 100, 0.3);
      backdrop-filter: blur(8px);
      transition: all 0.3s ease;
      cursor: default;
      text-decoration: none;
      color: white;
    }

    .platform i {
      font-size: 2rem;
      color: #ffb16f;
      transition: transform 0.2s;
    }

    .platform span {
      font-weight: 500;
      font-size: 1.2rem;
    }

    .platform:hover {
      transform: translateY(-5px);
      background: rgba(0, 0, 0, 0.6);
      border-color: #ffb16f;
      box-shadow: 0 15px 30px rgba(0,0,0,0.3);
    }

    .platform:hover i {
      transform: scale(1.1);
    }

    /* Back to Home button */
    .home-button {
      display: inline-block;
      margin-top: 2.5rem;
      padding: 0.7rem 1.8rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 210, 140, 0.3);
      border-radius: 60px;
      color: #ffeacb;
      text-decoration: none;
      font-weight: 300;
      letter-spacing: 1px;
      transition: all 0.3s ease;
      backdrop-filter: blur(4px);
      animation: slideUp 0.7s 0.5s both;
    }

    .home-button i {
      margin-right: 0.5rem;
      transition: transform 0.2s;
    }

    .home-button:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: #ffb16f;
      transform: translateY(-2px);
    }

    .home-button:hover i {
      transform: translateX(-3px);
    }

    /* Small footer note */
    .location {
      margin-top: 2rem;
      font-size: 0.8rem;
      opacity: 0.4;
      letter-spacing: 2px;
      display: flex;
      justify-content: center;
      gap: 0.8rem;
    }

    .location span {
      display: inline-block;
      width: 4px;
      height: 4px;
      background: rgba(255,255,255,0.5);
      border-radius: 50%;
      align-self: center;
    }

    /* Entrance animations */
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Responsive */
   @media (max-width: 768px) {

  body {
    padding: 1rem;
  }

  .card {
    padding: 2rem 1.2rem;
    border-radius: 2rem;
  }

  .coming-soon-main {
    font-size: 2.5rem;
    letter-spacing: 2px;
  }

  .subtext {
    font-size: 0.95rem;
    letter-spacing: 2px;
  }

  .platforms {
    flex-direction: column;
    gap: 1rem;
  }

  .platform {
    width: 100%;
    justify-content: center;
    padding: 0.8rem 1rem;
  }

  .platform span {
    font-size: 1rem;
  }

  .question-box {
    font-size: 1.8rem;
    gap: 0.6rem;
  }

  .home-button {
    width: 100%;
    text-align: center;
  }

  .location {
    font-size: 0.7rem;
  }
}
    @media (max-width: 400px) {
      .coming-soon-main {
        font-size: 2.8rem;
        letter-spacing: 2px;
      }
      .subtext {
        font-size: 1rem;
        letter-spacing: 2px;
      }
    }
  </style>
</head>
<body>
  <!-- Floating background particles -->
  <div class="particle particle1"></div>
  <div class="particle particle2"></div>
  <div class="particle particle3"></div>

  <main class="card">
    <!-- EST. 2010 -->
    <div class="est">EST. 2010</div>

    <!-- Main coming soon message -->
    <h1 class="coming-soon-main">COMING SOON</h1>
    <div class="subtext">A new experience awaits</div>

    <!-- ??? animated -->
    <div class="question-box">
      <span>⁉️</span>
      <span>❓</span>
      <span>⁉️</span>
    </div>

    <!-- Available on GoFood & GrabFood -->
    <div class="platforms">
      <div class="platform">
        <i class="fas fa-utensils"></i>
        <span>GoFood</span>
      </div>
      <div class="platform">
        <i class="fas fa-motorcycle"></i>
        <span>GrabFood</span>
      </div>
    </div>

    <!-- subtle location hint -->
    <div class="location">
      <span></span> LUCKNOW • INDIA <span></span>
    </div>

    <!-- Back to Home button -->
    <a href="index2.html" class="home-button"><i class="fas fa-arrow-left"></i> Back to Home</a>
  </main>
</body>
</html>
